spring.application.name=campaign-service
spring.config.import=optional:file:./.env[.properties]

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:genphish_db}
spring.datasource.username=${POSTGRES_USER:genphish_admin}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Apache Kafka ──
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:campaign-service-group}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_TRUSTED_PACKAGES:com.genphish.campaign.*}

# ── Redis ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Server ──
server.port=${SERVER_PORT:8080}

# ── Custom App Configuration ──
# Base URL of the Go tracking service for phishing links and open pixels
app.tracker.base-url=${TRACKER_BASE_URL:http://localhost:8081}

# Threshold score above which an employee is considered 'HIGH_RISK'
app.campaign.high-risk-threshold=${CAMPAIGN_HIGH_RISK_THRESHOLD:70.0}

# CORS allowed origins (comma separated for multiple)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Scheduler interval for checking scheduled campaigns (in milliseconds, 5 mins = 300000)
app.scheduler.campaign-check-rate=${CAMPAIGN_CHECK_RATE_MS:300000}

# Base URL for the Python AI Service (used for REST fallbacks)
app.python-service.base-url=${PYTHON_SERVICE_BASE_URL:http://localhost:5000}

# Disable HTTP payload logging by default to avoid sensitive data leakage.
app.logging.http.log-payloads=${HTTP_LOG_PAYLOADS:false}

# Distributed Tracing Configuration (W3C Standard)
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.propagation.type=W3C
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Logging Levels
logging.level.com.genphish=${LOG_LEVEL_GENPHISH:INFO}

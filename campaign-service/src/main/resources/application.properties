spring.application.name=campaign-service

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:genphish_db}
spring.datasource.username=${POSTGRES_USER:genphish_admin}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Apache Kafka ──
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=campaign-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.genphish.campaign.*

# ── Redis ──
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Server ──
server.port=8080

# ── Custom App Configuration ──
# Base URL of the Go tracking service for phishing links and open pixels
app.tracker.base-url=http://localhost:8081

# Threshold score above which an employee is considered 'HIGH_RISK'
app.campaign.high-risk-threshold=70.0

# CORS allowed origins (comma separated for multiple)
app.cors.allowed-origins=http://localhost:3000

# Scheduler interval for checking scheduled campaigns (in milliseconds, 5 mins = 300000)
app.scheduler.campaign-check-rate=300000

# Base URL for the Python AI Service (used for REST fallbacks)
app.python-service.base-url=http://localhost:5000

# Disable HTTP payload logging by default to avoid sensitive data leakage.
app.logging.http.log-payloads=false

# Distributed Tracing Configuration (W3C Standard)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=W3C

# Logging Levels
logging.level.com.genphish=INFO

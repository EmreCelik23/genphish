worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  # Lightweight gateway-side throttling
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=25r/s;
  limit_req_zone $binary_remote_addr zone=track_zone:10m rate=80r/s;

  # Require at least one auth header for /api/* routes.
  map $http_authorization $has_auth_header {
    default 1;
    ""      0;
  }
  map $http_x_service_token $has_service_token_header {
    default 1;
    ""      0;
  }
  map "$has_auth_header$has_service_token_header" $api_auth_header_present {
    default 1;
    "00"    0;
  }

  upstream campaign_upstream {
    zone campaign_upstream 64k;
    server campaign-service:8080 resolve;
    keepalive 32;
  }

  upstream tracker_upstream {
    zone tracker_upstream 64k;
    server tracker-service:8081 resolve;
    keepalive 32;
  }

  server {
    listen 8088;
    server_name _;
    client_max_body_size 15m;

    location = /healthz {
      default_type application/json;
      return 200 '{"status":"ok"}';
    }

    # Public tracking routes (email pixel/click/submit/download/oauth callback)
    location ~ ^/(track/|oauth/callback) {
      limit_req zone=track_zone burst=160 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://tracker_upstream;
    }

    # Campaign API entrypoint.
    location /api/ {
      default_type application/json;

      if ($api_auth_header_present = 0) {
        return 401 '{"error":"Missing Authorization or X-Service-Token header."}';
      }

      limit_req zone=api_zone burst=50 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Forward auth/tenant headers explicitly for backend filters.
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Service-Token $http_x_service_token;
      proxy_set_header X-Internal-Token $http_x_internal_token;
      proxy_set_header X-Company-Id $http_x_company_id;
      proxy_set_header X-Tenant-Id $http_x_tenant_id;

      proxy_pass http://campaign_upstream;
    }

    # Keep actuator private from internet by default.
    location /actuator/ {
      return 403;
    }

    location / {
      return 404;
    }
  }
}

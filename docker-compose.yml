services:
  # 1. PostgreSQL: İlişkisel Veritabanı
  postgres:
    image: postgres:16-alpine
    container_name: genphish-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genphish_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-genphish_db}
    ports:
      # TODO (SaaS Aşaması): Canlı ortamda dışarıya port KESİNLİKLE açılmaz. Sadece iç ağdan erişilecek.
      - "5432:5432"
    volumes:
      # TODO (SaaS Aşaması): Lokal klasörler yerine AWS RDS gibi yönetilen bulut çözümleri kullanılacak.
      - postgres_data:/var/lib/postgresql/data
    networks:
      - genphish_net

  # 2. MongoDB: NoSQL Veritabanı
  mongodb:
    image: mongo:8.0
    container_name: genphish-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      # TODO (SaaS Aşaması): Dış port kapatılacak, ağ (network) seviyesinde izole edilecek.
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - genphish_net

  # 3. Redis: Önbellekleme (Cache)
  redis:
    image: redis:8-alpine
    container_name: genphish-redis
    ports:
      # TODO (SaaS Aşaması): Dış port kapatılacak.
      - "6379:6379"
    networks:
      - genphish_net

  # 4. Kafka: Mesajlaşma ve Kuyruk Sistemi
  kafka:
    image: apache/kafka:3.7.0
    container_name: genphish-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - genphish_net

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: genphish-kafka-init
    depends_on:
      - kafka
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          echo "waiting for kafka..."
          sleep 1
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ai_generation_requests --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ai_generation_responses --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic tracking_events --partitions 1 --replication-factor 1
        echo "kafka topics ensured"
    networks:
      - genphish_net

volumes:
  postgres_data:
  mongodb_data:

networks:
  genphish_net:
    driver: bridge
